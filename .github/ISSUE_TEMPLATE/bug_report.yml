name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to trigger the issue.
      render: rust
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: br41ndmg version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: Output of `rustc --version`
      placeholder: "rustc 1.87.0 (2025-05-09)"
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: false
